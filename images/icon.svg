<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    
    <!-- Lens gradient for glass effect -->
    <radialGradient id="lensGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </radialGradient>
    
    <!-- Lightning gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Inner shadow for lens depth -->
    <filter id="lensShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="2" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    
    <!-- Lightning glow -->
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#fbbf24" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base shadow layer -->
  <rect x="6" y="8" width="120" height="120" rx="28" ry="28" fill="rgba(0,0,0,0.12)"/>
  
  <!-- Main background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)"/>
  
  <!-- Top highlight strip -->
  <rect x="4" y="4" width="120" height="60" rx="28" ry="28" fill="rgba(255,255,255,0.1)"/>
  <rect x="4" y="34" width="120" height="30" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Magnifying glass group -->
  <g filter="url(#shadow)">
    <!-- Lens outer ring -->
    <circle cx="50" cy="48" r="29" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="12"/>
    <!-- Lens main ring -->
    <circle cx="50" cy="48" r="29" fill="url(#lensGrad)" stroke="white" stroke-width="7"/>
    
    <!-- Lens inner depth ring -->
    <circle cx="50" cy="48" r="22" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>
    
    <!-- Glass shine highlight -->
    <ellipse cx="42" cy="39" rx="12" ry="9" fill="rgba(255,255,255,0.3)" transform="rotate(-25 42 39)"/>
    
    <!-- Small secondary shine -->
    <ellipse cx="58" cy="56" rx="5" ry="3" fill="rgba(255,255,255,0.1)" transform="rotate(15 58 56)"/>
  </g>
  
  <!-- Handle -->
  <line x1="72" y1="70" x2="86" y2="84" stroke="white" stroke-width="8" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Handle highlight -->
  <line x1="72" y1="68" x2="84" y2="80" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Lightning bolt with glow -->
  <g filter="url(#boltGlow)">
    <polygon points="80,80 68,100 77,100 70,120 98,88 85,88 92,80" fill="url(#boltGrad)"/>
    <!-- Bolt highlight edge -->
    <polygon points="80,80 68,100 77,100 70,120 75,120 82,100 73,100 84,82" fill="rgba(255,255,255,0.2)"/>
    <!-- Bolt edge shadow -->
    <line x1="98" y1="88" x2="70" y2="120" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  </g>
</svg>
